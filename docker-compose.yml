services:

  redis:
    image: redis

  db:
    image: postgres:9.4
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  vote:
    image: dockersamples/examplevotingapp_vote
    ports:
      - "5000:80"
    depends_on:
      - redis

  worker:
    image: dockersamples/examplevotingapp_worker
    depends_on:
      - redis
      - db

  result:
    image: dockersamples/examplevotingapp_result
    ports:
      - "5001:80"
    depends_on:
      - db